<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Century Technologies — Scheduled Maintenance</title>
  <meta name="description" content="New Century Technologies website is undergoing scheduled maintenance. We'll be right back." />
  <style>
    :root {
      --bg-top: #ffffff;
      --bg-bottom: #f1f5f9;
      --ink: #1e293b;
      --muted: #64748b;
      --green: #4caf3f;
      --red: #e02424;
      --accent: #1d4ed8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      max-width: 540px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }
    .logo {
      width: 200px;
      max-width: 70%;
      height: auto;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 999px;
      background: #eef2ff;
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(26px, 5.5vw, 38px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
      color: var(--ink);
    }
    p.lead {
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 8px;
    }
    p.thanks {
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 36px;
    }
    .gear {
      display: inline-block;
      font-size: 40px;
      margin-bottom: 24px;
      animation: spin 4s linear infinite;
      transform-origin: center;
    }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 32px 0 24px;
    }
    .footer {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
